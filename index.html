        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(20, 26, 42, 0.8);

            --neon: #00f2ff;
            --text: #e2e8f0;
            --soccer: #10b981;
            --red: #f43f5e;
            --trans: 0.3s ease;
        }

        body.light-mode {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --nav-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --accent: #6d28d9;
            --neon: #7c3aed;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; min-height: 100vh;
            transition: background var(--trans), color var(--trans);
            background-attachment: fixed;
        }

        .header { text-align: center; padding: 25px 20px; position: relative; }
        
        .top-controls {
            position: absolute; top: 20px; left: 20px;
            display: flex; gap: 10px; align-items: center; z-index: 1000;
        }
        [dir="ltr"] .top-controls { left: auto; right: 20px; }

        .lang-switcher, .theme-toggle {
            background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1);
            color: var(--text); padding: 10px; border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(10px); font-size: 14px; display: flex; align-items: center;
        }

        .main-logo {
            width: 80px; height: 80px; margin: 0 auto 10px;
            filter: drop-shadow(0 0 10px var(--neon));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .nav-container {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 15px; justify-content: flex-start; scrollbar-width: none;
            background: var(--nav-bg); border-bottom: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(15px); position: sticky; top: 0; z-index: 999;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: var(--card-bg); padding: 12px 20px; border-radius: 15px;
            cursor: pointer; transition: var(--trans); border: 1px solid rgba(0,0,0,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px; font-weight: 600;
            position: relative;
        }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--neon); }
        .nav-counter { background: var(--red); color: white; font-size: 10px; padding: 2px 7px; border-radius: 50px; font-weight: bold; }

        .controls { max-width: 800px; margin: 25px auto; padding: 0 20px; display: flex; gap: 10px; }
        .search-bar { flex: 1; padding: 15px 25px; border-radius: 100px; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text); outline: none; }
        .view-toggle { width: 48px; height: 48px; border-radius: 50%; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--neon); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .main-grid { display: grid; gap: 20px; padding: 0 20px; max-width: 1200px; margin: 0 auto 60px; }
        .grid-view { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .list-view { grid-template-columns: 1fr; }
        .list-view .card { display: flex; align-items: center; justify-content: space-between; }
        .list-view .card p { margin: 0 20px; height: auto; flex: 1; text-align: inherit; }
        .list-view .btn { width: auto; min-width: 120px; margin: 0; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s; animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin: 0 0 8px; color: var(--neon); font-size: 19px; }
        .card p { font-size: 13px; color: #94a3b8; height: 40px; overflow: hidden; margin-bottom: 15px; }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; transition: 0.3s; }

        .footer { text-align: center; padding: 40px; opacity: 0.7; border-top: 1px solid rgba(0,0,0,0.05); font-size: 13px; }

    let currentLang = 'ar';

    let isGrid = true;

    function toggleTheme() {
        const b = document.getElementById('body');
        const i = document.getElementById('themeIcon');
        b.classList.toggle('light-mode');
        const mode = b.classList.contains('light-mode') ? 'light' : 'dark';
        i.className = mode === 'light' ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', mode);
    }

    function changeLang(lang) {
        currentLang = lang;
        document.getElementById('mainHtml').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        document.getElementById('ui-title').innerText = uiStrings[lang].title;
        document.getElementById('search').placeholder = uiStrings[lang].search;
        document.getElementById('ui-footer').innerText = uiStrings[lang].footer;
        renderNav();
        render();
    }

    function renderNav() {
        const nav = document.getElementById('navContainer');
        const cats = ['ai', 'sports', 'news', 'games', 'soft', 'ads'];
        const icons = { ai: 'robot', sports: 'futbol', news: 'newspaper', games: 'gamepad', soft: 'desktop', ads: 'ad' };
        nav.innerHTML = cats.map(c => {
            let count = localStorage.getItem('nav_' + c) || 0;
            return `
            <div class="nav-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}', this)">
                <i class="fas fa-${icons[c]}"></i> ${uiStrings[currentLang][c]} <span class="nav-counter">${count}</span>
            </div>`;
        }).join('');
    }

    function setCat(c, btn) {
        currentCat = c;
        let count = parseInt(localStorage.getItem('nav_' + c) || 0) + 1;
        localStorage.setItem('nav_' + c, count);
        renderNav();
        render();
    }

    function toggleView() {
        isGrid = !isGrid;
        const g = document.getElementById('mainGrid');
        const i = document.getElementById('viewIcon');
        g.className = isGrid ? 'main-grid grid-view' : 'main-grid list-view';
        i.className = isGrid ? 'fas fa-th-list' : 'fas fa-th-large';
    }

                <h3>${t.name[currentLang]}</h3>
                <p>${t.desc[currentLang]}</p>
                <a href="${t.link}" target="_blank" class="btn">${uiStrings[currentLang].enter}</a>
            </div>`;
        });
    }

    if (localStorage.getItem('theme') === 'light') toggleTheme();
    document.getElementById('search').addEventListener('input', e => render(e.target.value));
    changeLang('ar');
</script>
</body>
</html>
