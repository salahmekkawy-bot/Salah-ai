<!DOCTYPE html>
<html id="mainHtml" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - Official Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f1a; --card-bg: rgba(20, 26, 42, 0.95);
            --accent: #7c3aed; --neon: #00f2ff; --text: #e2e8f0; --green: #25d366; --red: #f43f5e;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; }
        
        .header { text-align: center; padding: 25px; position: relative; border-bottom: 1px solid rgba(255,255,255,0.05); }
        #digitalClock { font-size: 40px; font-weight: bold; color: var(--neon); text-shadow: 0 0 15px var(--accent); }

        /* برواز النتائج الحقيقية من 365Scores */
        .live-scores-container { max-width: 1000px; margin: 15px auto; padding: 0 15px; }
        .live-frame { width: 100%; height: 180px; border: 2px solid var(--accent); border-radius: 20px; background: #000; overflow: hidden; position: relative; }
        .live-frame iframe { width: 100%; height: 100%; border: none; }
        .source-tag { font-size: 11px; color: var(--neon); text-align: center; margin-top: 5px; opacity: 0.7; }

        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; padding: 20px; max-width: 900px; margin: 0 auto; }
        .folder-card { background: var(--card-bg); border-radius: 20px; padding: 25px 10px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .folder-card:hover { transform: translateY(-5px); border-color: var(--neon); }
        .folder-card i { font-size: 35px; color: var(--neon); margin-bottom: 10px; display: block; }

        /* السبحة الإلكترونية */
        .subha-container { background: var(--card-bg); border-radius: 25px; padding: 30px; border: 2px solid var(--green); text-align: center; margin-bottom: 25px; }
        .subha-count { font-size: 60px; font-weight: bold; color: var(--green); margin: 20px 0; font-family: 'Courier New', monospace; }
        .subha-btn { background: var(--green); color: white; border: none; padding: 20px; border-radius: 50%; width: 100px; height: 100px; font-size: 24px; cursor: pointer; box-shadow: 0 0 20px rgba(37, 211, 102, 0.4); }
        .subha-reset { background: none; border: 1px solid var(--red); color: var(--red); padding: 8px 15px; border-radius: 10px; cursor: pointer; margin-top: 20px; }

        .view-section { display: none; padding: 20px; max-width: 800px; margin: 0 auto; animation: fadeIn 0.4s ease; }
        .back-btn { color: var(--neon); cursor: pointer; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        .footer { text-align: center; padding: 40px; opacity: 0.5; font-size: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="header">
    <div id="digitalClock">00:00:00</div>
    <h1 style="margin: 10px 0; font-size: 28px;">Salah Mekkawey Hub</h1>
</div>

<div class="live-scores-container">
    <div class="live-frame">
        <iframe src="https://www.365scores.com/ar/football"></iframe>
    </div>
    <p class="source-tag"><i class="fas fa-check-circle"></i> نتائج مباشرة وموثوقة من 365Scores</p>
</div>

<div id="homeUI">
    <div class="categories-grid">
        <div class="folder-card" onclick="openSection('islamic')"><i class="fas fa-kaaba"></i><span>نور الإيمان</span></div>
        <div class="folder-card" onclick="openSection('social')"><i class="fas fa-share-alt"></i><span>قنواتي</span></div>
        <div class="folder-card" onclick="openSection('ai')"><i class="fas fa-robot"></i><span>ذكاء اصطناعي</span></div>
        <div class="folder-card" onclick="openSection('sports')"><i class="fas fa-futbol"></i><span>الرياضة</span></div>
        <div class="folder-card" onclick="openSection('news')"><i class="fas fa-newspaper"></i><span>الأخبار</span></div>
    </div>
</div>

<div class="view-section" id="islamicView">
    <div class="back-btn" onclick="goHome()"><i class="fas fa-arrow-right"></i> رجوع</div>
    
    <div class="subha-container">
        <h3>السبحة الإلكترونية</h3>
        <div class="subha-count" id="s-count">0</div>
        <button class="subha-btn" onclick="countSubha()">اضغط</button><br>
        <button class="subha-reset" onclick="resetSubha()">تصفير العداد</button>
    </div>

    <div style="background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid var(--accent);">
        <h4>المصحف المرتل</h4>
        <select id="reciter" style="width:100%; padding:10px; margin-bottom:15px; background:#000; color:white; border-radius:10px;">
            <option value="https://server7.mp3quran.net/s_gmd/001.mp3">سعد الغامدي</option>
            <option value="https://server10.mp3quran.net/minsh/001.mp3">محمد صديق المنشاوي</option>
            <option value="https://server8.mp3quran.net/afs/001.mp3">مشاري العفاسي</option>
        </select>
        <audio id="player" controls style="width:100%;"></audio>
    </div>
</div>

<div class="view-section" id="toolsView">
    <div class="back-btn" onclick="goHome()"><i class="fas fa-arrow-right"></i> رجوع</div>
    <div id="toolsGrid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;"></div>
</div>

<div class="footer">© 2026 Salah Mekkawey | Professional Global Hub</div>

<script>
    function updateTime() { document.getElementById('digitalClock').innerText = new Date().toLocaleTimeString('ar-EG'); }
    setInterval(updateTime, 1000); updateTime();

    // وظائف السبحة
    let count = 0;
    function countSubha() { count++; document.getElementById('s-count').innerText = count; }
    function resetSubha() { count = 0; document.getElementById('s-count').innerText = count; }

    const tools = [
        { cat:'social', name:'YouTube', link:'https://youtube.com/@SalahMekkawey' },
        { cat:'sports', name:'365Scores Live', link:'https://www.365scores.com/ar/football' },
        { cat:'sports', name:'Yacine TV', link:'https://yacineapp.tv/' },
        { cat:'ai', name:'ChatGPT', link:'https://chat.openai.com' }
    ];

    function openSection(s) {
        document.getElementById('homeUI').style.display = 'none';
        if(s === 'islamic') {
            document.getElementById('islamicView').style.display = 'block';
        } else {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = tools.filter(t => t.cat === s).map(t => `
                <div style="background:var(--card-bg); padding:20px; border-radius:15px; border:1px solid rgba(255,255,255,0.1);">
                    <h3>${t.name}</h3>
                    <button style="background:var(--accent); color:white; border:none; width:100%; padding:10px; border-radius:8px; cursor:pointer;" onclick="window.open('${t.link}', '_blank')">دخول</button>
                </div>
            `).join('');
            document.getElementById('toolsView').style.display = 'block';
        }
    }

    function goHome() {
        document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
        document.getElementById('homeUI').style.display = 'block';
    }
</script>
</body>
</html>
