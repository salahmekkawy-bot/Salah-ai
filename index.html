<html id="mainHtml" lang="ar" dir="rtl">

    <style>
        :root {
            --bg: #0b0f1a; --card-bg: rgba(20, 26, 42, 0.8); --nav-bg: rgba(0,0,0,0.4);
            --accent: #7c3aed; --neon: #00f2ff; --text: #e2e8f0; --soccer: #10b981; --red: #f43f5e;
            --trans: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body.light-mode {
            --bg: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9); --nav-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a; --accent: #6d28d9; --neon: #7c3aed;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; transition: var(--trans); overflow-x: hidden; }
        
        .header { text-align: center; padding: 25px 20px; position: relative; }
        .top-controls { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 1001; }
        [dir="ltr"] .top-controls { left: auto; right: 20px; }
        
        .lang-switcher, .theme-toggle { background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text); padding: 10px; border-radius: 12px; cursor: pointer; backdrop-filter: blur(10px); transition: 0.3s; }
        .lang-switcher:hover, .theme-toggle:hover { border-color: var(--neon); }

        .main-logo { width: 70px; height: 70px; margin: 0 auto 10px; filter: drop-shadow(0 0 10px var(--neon)); animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .upload-btn { background: linear-gradient(45deg, #ff0050, #00f2ea); color: white; border: none; padding: 10px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; }
        .upload-btn:hover { transform: scale(1.05); }

        .nav-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: var(--nav-bg); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-container::-webkit-scrollbar { display: none; }
        .nav-btn { background: var(--card-bg); padding: 12px 20px; border-radius: 15px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 8px; font-weight: 600; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--neon); }
        .nav-counter { background: var(--red); color: white; font-size: 10px; padding: 2px 7px; border-radius: 50px; font-weight: bold; }

        .controls { max-width: 800px; margin: 20px auto; padding: 0 20px; display: flex; gap: 10px; }
        .search-bar { flex: 1; padding: 14px; border-radius: 50px; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text); outline: none; text-align: center; }
        .view-toggle { width: 48px; height: 48px; border-radius: 50%; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--neon); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        .main-grid { display: grid; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; min-height: 400px; }
        .grid-view { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .list-view { grid-template-columns: 1fr; }
        .list-view .card { display: flex; align-items: center; justify-content: space-between; text-align: inherit; }
        .list-view .card p { margin: 0 20px; height: auto; flex: 1; }
        .list-view .btn { width: auto; min-width: 120px; margin: 0; }

        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; animation: fadeIn 0.4s ease; backdrop-filter: blur(5px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .card h3 { margin: 0 0 8px; color: var(--neon); font-size: 19px; }
        .card p { font-size: 13px; color: #94a3b8; height: 40px; overflow: hidden; line-height: 1.5; }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); letter-spacing: 0.5px; }

        .footer { text-align: center; padding: 50px 20px; opacity: 0.7; font-size: 14px; border-top: 1px solid rgba(0,0,0,0.05); font-weight: bold; }

    function toggleTheme() {

    }

    function changeLang(l) {
        currentLang = l; document.getElementById('mainHtml').dir = (l === 'ar') ? 'rtl' : 'ltr';
        document.getElementById('search').placeholder = uiStrings[l].search;
        document.getElementById('ui-footer').innerText = "© 2026 Salah Mekkawey | All Rights Reserved";
        renderNav(); render();
    }

    function renderNav() {
        const nav = document.getElementById('navContainer');
        const cats = ['ai', 'sports', 'news', 'games', 'soft'];
        const icons = { ai: 'robot', sports: 'futbol', news: 'newspaper', games: 'gamepad', soft: 'desktop' };
        nav.innerHTML = cats.map(c => {
            let count = items.filter(i => i.cat === c).length;
            return `<div class="nav-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}', this)"><i class="fas fa-${icons[c]}"></i> ${uiStrings[currentLang][c]} <span class="nav-counter">${count}</span></div>`;
        }).join('');
    }

    function setCat(c, btn) { currentCat = c; renderNav(); render(); }

    function toggleView() {
        isGrid = !isGrid;
        const g = document.getElementById('mainGrid');
        g.className = isGrid ? 'main-grid grid-view' : 'main-grid list-view';
        document.getElementById('viewIcon').className = isGrid ? 'fas fa-th-list' : 'fas fa-th-large';
    }

    function render(s = "") {
        const g = document.getElementById('mainGrid'); g.innerHTML = "";
        const f = items.filter(t => t.cat === currentCat && (t.name.toLowerCase().includes(s.toLowerCase()) || (typeof t.desc === 'object' && t.desc[currentLang].includes(s))));
        f.forEach(t => {
            let d = typeof t.desc === 'object' ? t.desc[currentLang] : t.desc;
            g.innerHTML += `<div class="card"><h3>${t.name}</h3><p>${d}</p><a href="${t.link}" target="_blank" class="btn">${uiStrings[currentLang].enter}</a></div>`;
        });
    }

    if (localStorage.getItem('theme') === 'light') toggleTheme();
    changeLang('ar');
