<!DOCTYPE html>
<html id="mainHtml" lang="ar" dir="rtl">

    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #8b5cf6;
            --neon: #00f2ff;
            --text: #f8fafc;
            --soccer: #22c55e;
            --red: #ef4444;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 10% 10%, #1e1b4b 0%, #0f172a 100%);
            transition: 0.3s;
        }

        [dir="ltr"] { text-align: left; }
        [dir="rtl"] { text-align: right; }

        .header { text-align: center; padding: 25px 20px; position: relative; }
        
        .lang-switcher {
            position: absolute; top: 20px; left: 20px;
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            color: white; padding: 8px; border-radius: 10px; cursor: pointer; z-index: 100;
        }
        [dir="ltr"] .lang-switcher { left: auto; right: 20px; }

        .logo-box { font-size: 35px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin: 0; }

        .nav-container {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 15px; justify-content: flex-start; scrollbar-width: none;
            background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: var(--card); padding: 12px 20px; border-radius: 15px;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 10px;
            position: relative; font-size: 14px;
        }
        .nav-btn.active { background: var(--accent); border-color: var(--neon); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }
        .nav-counter { background: var(--red); color: white; font-size: 10px; padding: 2px 7px; border-radius: 50px; font-weight: bold; }

        .controls { max-width: 800px; margin: 20px auto; padding: 0 20px; display: flex; gap: 10px; align-items: center; }
        .search-bar { flex: 1; padding: 14px 20px; border-radius: 50px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; text-align: center; }
        .view-toggle { width: 48px; height: 48px; border-radius: 50%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: var(--neon); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .main-grid { display: grid; gap: 20px; padding: 0 20px; max-width: 1200px; margin: 0 auto 50px; }
        .grid-view { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .list-view { grid-template-columns: 1fr; }
        .list-view .card { display: flex; align-items: center; justify-content: space-between; text-align: inherit; }
        .list-view .card p { margin: 0 20px; height: auto; flex: 1; }
        .list-view .btn { width: auto; min-width: 120px; margin: 0; }

        .card {
            background: var(--card); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.4s ease forwards;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .card h3 { margin: 0 0 8px; font-size: 19px; color: var(--neon); }
        .card p { font-size: 13px; color: #cbd5e1; height: 40px; overflow: hidden; margin-bottom: 15px; }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; transition: 0.3s; }

        .footer { text-align: center; padding: 40px; opacity: 0.6; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>

    let currentLang = 'ar';

    let isGrid = true;

    function changeLang(lang) {
        currentLang = lang;
        const html = document.getElementById('mainHtml');
        html.lang = lang;
        html.dir = (lang === 'ar') ? 'rtl' : 'ltr';
        document.getElementById('ui-title').innerText = uiStrings[lang].title;
        document.getElementById('search').placeholder = uiStrings[lang].search;
        document.getElementById('ui-footer').innerText = uiStrings[lang].footer;
        renderNav();
        render();
    }

    function autoDetectLang() {
        const browserLang = navigator.language.split('-')[0];
        const supported = ['ar', 'en', 'fr'];
        const target = supported.includes(browserLang) ? browserLang : 'ar';
        document.getElementById('langSelect').value = target;
        changeLang(target);
    }

    function renderNav() {
        const nav = document.getElementById('navContainer');
        const cats = ['ai', 'sports', 'news', 'games', 'soft', 'ads'];
        const icons = { ai: 'robot', sports: 'futbol', news: 'newspaper', games: 'gamepad', soft: 'desktop', ads: 'ad' };
        nav.innerHTML = cats.map(c => {
            let count = localStorage.getItem('nav_' + c) || 0;
            return `
                <div class="nav-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}', this)">
                    <i class="fas fa-${icons[c]}"></i> ${uiStrings[currentLang][c]} <span class="nav-counter">${count}</span>
                </div>`;
        }).join('');
    }

    function setCat(c, btn) {
        currentCat = c;
        let count = parseInt(localStorage.getItem('nav_' + c) || 0) + 1;
        localStorage.setItem('nav_' + c, count);
        renderNav();
        render();
    }

    function toggleView() {
        isGrid = !isGrid;
        const g = document.getElementById('mainGrid');
        const i = document.getElementById('viewBtn').querySelector('i');
        g.className = isGrid ? 'main-grid grid-view' : 'main-grid list-view';
        i.className = isGrid ? 'fas fa-th-list' : 'fas fa-th-large';
    }

    function render(s = "") {
        const g = document.getElementById('mainGrid');
        g.innerHTML = "";
        const f = items.filter(t => t.cat === currentCat && t.name[currentLang].toLowerCase().includes(s.toLowerCase()));
        f.forEach(t => {
            g.innerHTML += `
                <div class="card">
                    <h3>${t.name[currentLang]}</h3>
                    <p>${t.desc[currentLang]}</p>
                    <a href="${t.link}" target="_blank" class="btn">${uiStrings[currentLang].enter}</a>
                </div>`;
        });
    }

    document.getElementById('search').addEventListener('input', e => render(e.target.value));
    autoDetectLang();
</script>
</body>
</html>
