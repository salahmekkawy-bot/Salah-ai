    <style>
        :root {

            --yt: #ff0000; --fb: #1877f2; --tk: #ffffff;
        }
        body.light-mode {
            --bg: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9); --nav-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a; --accent: #6d28d9; --neon: #7c3aed;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; overflow-x: hidden; }
        
        /* الإضاءة الخلفية لتمييز الكود الجديد */
        body::before { content: ""; position: fixed; top: -10%; left: -10%; width: 40%; height: 40%; background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%); z-index: -1; }

        .header { text-align: center; padding: 25px 20px; position: relative; }
        .top-controls { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 1001; }
        [dir="ltr"] .top-controls { left: auto; right: 20px; }
        .lang-switcher, .theme-toggle { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px; border-radius: 12px; cursor: pointer; backdrop-filter: blur(10px); }
        
        .main-logo { width: 80px; height: 80px; margin: 0 auto 10px; filter: drop-shadow(0 0 15px var(--neon)); animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        
        .action-btns { display: flex; justify-content: center; gap: 10px; margin-top: 10px; }
        .install-btn { background: linear-gradient(45deg, #7c3aed, #00f2ff); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }
        .upload-btn { background: linear-gradient(45deg, #ff0050, #00f2ea); color: white; border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .nav-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: var(--nav-bg); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .nav-container::-webkit-scrollbar { display: none; }
        .nav-btn { background: var(--card-bg); padding: 12px 20px; border-radius: 15px; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 8px; font-weight: 600; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--neon); }
        .nav-counter { background: var(--red); color: white; font-size: 10px; padding: 2px 7px; border-radius: 50px; }

        .controls { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .search-bar { width: 100%; padding: 14px; border-radius: 50px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); outline: none; text-align: center; box-sizing: border-box; }

        .main-grid { display: grid; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .grid-view { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        
        .card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; animation: fadeIn 0.5s ease; backdrop-filter: blur(5px); }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin: 0 0 8px; color: var(--neon); font-size: 19px; }
        .card p { font-size: 13px; color: #94a3b8; height: 40px; overflow: hidden; line-height: 1.5; }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 15px; transition: 0.3s; }

        /* Social Colors */
        .card.youtube { border-top: 4px solid var(--yt); }
        .card.facebook { border-top: 4px solid var(--fb); }
        .card.tiktok { border-top: 4px solid var(--tk); }

        .footer { text-align: center; padding: 50px 20px; opacity: 0.7; font-size: 14px; border-top: 1px solid rgba(255,255,255,0.05); font-weight: bold; }

    function toggleTheme() {
        const b = document.body; b.classList.toggle('light-mode');

        localStorage.setItem('theme', b.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function changeLang(l) {
        currentLang = l; document.getElementById('mainHtml').dir = (l === 'ar') ? 'rtl' : 'ltr';
        document.getElementById('search').placeholder = uiStrings[l].search;
        renderNav(); render();
    }

    function renderNav() {
        const nav = document.getElementById('navContainer');
        const cats = ['social', 'ai', 'sports', 'news', 'games', 'soft'];
        const icons = { social: 'share-alt', ai: 'robot', sports: 'futbol', news: 'newspaper', games: 'gamepad', soft: 'desktop' };
        nav.innerHTML = cats.map(c => {
            let count = items.filter(i => i.cat === c).length;
            return `<div class="nav-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}', this)"><i class="fas fa-${icons[c]}"></i> ${uiStrings[currentLang][c]} <span class="nav-counter">${count}</span></div>`;
        }).join('');
    }

    function setCat(c, btn) { currentCat = c; renderNav(); render(); }

    function render(s = "") {
        const g = document.getElementById('mainGrid'); g.innerHTML = "";
        const f = items.filter(t => t.cat === currentCat && (t.name.toLowerCase().includes(s.toLowerCase())));
        f.forEach(t => {
            let d = typeof t.desc === 'object' ? t.desc[currentLang] : t.desc;
            g.innerHTML += `<div class="card ${t.class || ''}"><h3>${t.name}</h3><p>${d}</p><a href="${t.link}" target="_blank" class="btn">${uiStrings[currentLang].enter}</a></div>`;
        });
    }
