<!DOCTYPE html>
<html id="mainHtml" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - AI & Sports Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f1a; --card-bg: rgba(20, 26, 42, 0.8); --nav-bg: rgba(0,0,0,0.4);
            --accent: #7c3aed; --neon: #00f2ff; --text: #e2e8f0; --soccer: #10b981; --red: #f43f5e;
            --trans: 0.3s ease;
        }
        body.light-mode {
            --bg: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.9); --nav-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a; --accent: #6d28d9; --neon: #7c3aed;
        }

        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; transition: var(--trans); background-attachment: fixed; }
        .header { text-align: center; padding: 25px 20px; position: relative; }
        
        .upload-btn-main {
            background: linear-gradient(45deg, #ff0050, #00f2ea);
            color: white; border: none; padding: 10px 25px; border-radius: 50px;
            font-weight: bold; cursor: pointer; margin-top: 15px; box-shadow: 0 0 15px rgba(0,242,234,0.3);
            font-family: 'Segoe UI', sans-serif;
        }

        .top-controls { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; align-items: center; z-index: 1000; }
        [dir="ltr"] .top-controls { left: auto; right: 20px; }

        .lang-switcher, .theme-toggle {
            background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1);
            color: var(--text); padding: 10px; border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(10px); font-size: 14px;
        }

        .main-logo { width: 75px; height: 75px; margin: 0 auto 10px; filter: drop-shadow(0 0 10px var(--neon)); animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .nav-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px; background: var(--nav-bg); position: sticky; top: 0; z-index: 999; backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: var(--card-bg); padding: 12px 20px; border-radius: 15px; cursor: pointer; transition: var(--trans);
            white-space: nowrap; display: flex; align-items: center; gap: 8px; font-weight: 600; border: 1px solid rgba(0,0,0,0.05);
        }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--neon); }
        .nav-counter { background: var(--red); color: white; font-size: 10px; padding: 2px 7px; border-radius: 50px; }

        .controls { max-width: 800px; margin: 25px auto; padding: 0 20px; display: flex; gap: 10px; }
        .search-bar { flex: 1; padding: 15px 25px; border-radius: 100px; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text); outline: none; text-align: center; }
        .view-toggle { width: 48px; height: 48px; border-radius: 50%; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--neon); cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .main-grid { display: grid; gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto 50px; }
        .grid-view { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .list-view { grid-template-columns: 1fr; }
        .list-view .card { display: flex; align-items: center; justify-content: space-between; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .video-card { background: #000; border-radius: 25px; overflow: hidden; aspect-ratio: 9/16; position: relative; border: 2px solid var(--accent); transition: 0.3s; }
        .video-card:hover { transform: scale(1.02); }
        .video-info { position: absolute; bottom: 15px; right: 15px; left: 15px; color: white; text-shadow: 0 2px 10px rgba(0,0,0,0.9); }

        .card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin: 0 0 10px; color: var(--neon); }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 15px; }

        .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--bg); padding: 30px; border-radius: 25px; border: 2px solid var(--neon); width: 90%; max-width: 400px; text-align: center; position: relative; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--accent); background: var(--card-bg); color: var(--text); box-sizing: border-box; }

        .footer { text-align: center; padding: 50px 20px; opacity: 0.7; border-top: 1px solid rgba(0,0,0,0.05); font-weight: bold; }
    </style>
</head>
<body id="body">

<div class="header">
    <div class="top-controls">
        <select class="lang-switcher" id="langSelect" onchange="changeLang(this.value)">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
        <div class="theme-toggle" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></div>
    </div>
    
    <svg class="main-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" stroke="url(#p1)" stroke-width="4"/>
        <path d="M30 50L45 65L75 35" stroke="#00f2ff" stroke-width="6" stroke-linecap="round"/>
        <defs><linearGradient id="p1" x1="0" y1="0" x2="100" y2="100"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#00f2ff"/></linearGradient></defs>
    </svg>
    <h1 id="ui-title">Salah Mekkawey</h1>
    <button class="upload-btn-main" onclick="openUpload()"><i class="fas fa-cloud-upload-alt"></i> Upload Video</button>
</div>

<div class="nav-container" id="navContainer"></div>

<div class="controls">
    <input type="text" id="search" class="search-bar" placeholder="...">
    <div class="view-toggle" onclick="toggleView()"><i id="viewIcon" class="fas fa-th-list"></i></div>
</div>

<div class="main-grid grid-view" id="mainGrid"></div>

<div id="uploadModal" class="modal">
    <div class="modal-content">
        <h2>Upload Your Content</h2>
        <p>Send your Video Link (TikTok/YouTube) or File</p>
        <input type="text" placeholder="Video URL / Link...">
        <input type="file" accept="video/*">
        <button class="btn" onclick="closeUpload()">Submit for Review</button>
        <button style="background:none; border:none; color:var(--red); cursor:pointer; margin-top:15px; font-weight:bold;" onclick="closeUpload()">Cancel</button>
    </div>
</div>

<div class="footer"><p id="ui-footer">© 2026 Salah Mekkawey | All Rights Reserved</p></div>

<script>
    const uiStrings = {
        ar: { title: "Salah Mekkawey", search: "ابحث عن أداة، ماتش، أو فيديو...", ai: "ذكاء اصطناعي", sports: "رياضة مباشر", news: "أخبار اليوم", games: "ألعاب", shorts: "فيديوهات قصيرة", soft: "برامج", ads: "إعلانات", footer: "© 2026 Salah Mekkawey | جميع الحقوق محفوظة", enter: "دخول الآن" },
        en: { title: "Salah Mekkawey", search: "Search for tool, match, or video...", ai: "AI Tools", sports: "Sports", news: "Global News", games: "Games", shorts: "Shorts", soft: "Software", ads: "Ads", footer: "© 2026 Salah Mekkawey | All Rights Reserved", enter: "Access" },
        fr: { title: "Salah Mekkawey", search: "Chercher outil, match, ou vidéo...", ai: "Outils IA", sports: "Sports", news: "Actualités", games: "Jeux", shorts: "Vidéos", soft: "Logiciels", ads: "Pub", footer: "© 2026 Salah Mekkawey | Tous droits réservés", enter: "Entrer" }
    };

    const items = [
        // رياضة
        { cat:'sports', name:{ar:'Yacine TV (ياسين)', en:'Yacine TV', fr:'Yacine TV'}, desc:{ar:'بث مباشر للمباريات والقنوات الرياضية.', en:'Live sports streaming.', fr:'Sports en direct.'}, link:'https://yacineapp.tv/' },
        { cat:'sports', name:{ar:'كورة لايف (Kora Live)', en:'Kora Live', fr:'Kora Live'}, desc:{ar:'تغطية حية لجميع مباريات اليوم.', en:'Live match coverage.', fr:'Direct.'}, link:'https://koora-live.me/' },
        { cat:'sports', name:{ar:'Yalla Kora (يلا كورة)', en:'Yalla Kora', fr:'Yalla Kora'}, desc:{ar:'نتائج ومواعيد الماتشات.', en:'Scores and schedules.', fr:'Résultats.'}, link:'https://www.yallakora.com/' },

        // ذكاء اصطناعي (أمثلة من الـ 50)
        { cat:'ai', name:{ar:'ChatGPT', en:'ChatGPT', fr:'ChatGPT'}, desc:{ar:'ملك النصوص والبرمجة والتأليف.', en:'AI Writing & Coding.', fr:'IA Texte.'}, link:'https://chat.openai.com' },
        { cat:'ai', name:{ar:'Leonardo AI', en:'Leonardo AI', fr:'Leonardo AI'}, desc:{ar:'تصميم صور وشخصيات كرتون.', en:'Cartoon & Image design.', fr:'Dessin animé.'}, link:'https://leonardo.ai' },
        { cat:'ai', name:{ar:'ElevenLabs', en:'ElevenLabs', fr:'ElevenLabs'}, desc:{ar:'أفضل تعليق صوتي بشري.', en:'Best AI human voice.', fr:'Voix humaine IA.'}, link:'https://elevenlabs.io' },

        // فيديوهات قصيرة
        { cat:'shorts', name:'Zidane & Julia', desc:'Action Cat Series Episode 1', link:'#' },
        { cat:'shorts', name:'Minya Cats', desc:'Ramadan in Upper Egypt', link:'#' }
    ];

    // إضافة الـ 50 أداة تلقائياً في الخلفية (للنموذج)
    for(let i=1; i<=47; i++) {
        items.push({ cat:'ai', name:{ar:'AI Tool '+i, en:'AI Tool '+i, fr:'AI Tool '+i}, desc:{ar:'وصف الأداة الذكية رقم '+i, en:'Description for AI tool '+i, fr:'Description '+i}, link:'#' });
    }

    let currentLang = 'ar'; let currentCat = 'ai'; let isGrid = true;

    function openUpload() { document.getElementById('uploadModal').style.display = 'flex'; }
    function closeUpload() { document.getElementById('uploadModal').style.display = 'none'; }

    function toggleTheme() {
        const b = document.getElementById('body');
        b.classList.toggle('light-mode');
        document.getElementById('themeIcon').className = b.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('theme', b.classList.contains('light-mode') ? 'light' : 'dark');
    }

    function changeLang(l) {
        currentLang = l; document.getElementById('mainHtml').dir = (l === 'ar') ? 'rtl' : 'ltr';
        document.getElementById('ui-title').innerText = uiStrings[l].title;
        document.getElementById('search').placeholder = uiStrings[l].search;
        document.getElementById('ui-footer').innerText = uiStrings[l].footer;
        renderNav(); render();
    }

    function renderNav() {
        const nav = document.getElementById('navContainer');
        const cats = ['ai', 'sports', 'shorts', 'news', 'games', 'soft', 'ads'];
        const icons = { ai: 'robot', sports: 'futbol', shorts: 'play-circle', news: 'newspaper', games: 'gamepad', soft: 'desktop', ads: 'ad' };
        nav.innerHTML = cats.map(c => `<div class="nav-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}', this)"><i class="fas fa-${icons[c]}"></i> ${uiStrings[currentLang][c]} <span class="nav-counter">${localStorage.getItem('nav_'+c)||0}</span></div>`).join('');
    }

    function setCat(c, btn) {
        currentCat = c;
        localStorage.setItem('nav_'+c, parseInt(localStorage.getItem('nav_'+c)||0)+1);
        renderNav(); render();
    }

    function toggleView() {
        isGrid = !isGrid;
        document.getElementById('mainGrid').className = isGrid ? 'main-grid grid-view' : 'main-grid list-view';
        document.getElementById('viewIcon').className = isGrid ? 'fas fa-th-list' : 'fas fa-th-large';
    }

    function render(s = "") {
        const g = document.getElementById('mainGrid'); g.innerHTML = "";
        const f = items.filter(t => t.cat === currentCat && (typeof t.name==='object' ? t.name[currentLang].toLowerCase().includes(s.toLowerCase()) : t.name.toLowerCase().includes(s.toLowerCase())));
        
        if(currentCat === 'shorts') {
            g.className = "video-grid";
            f.forEach(v => {
                g.innerHTML += `<div class="video-card"><div style="height:100%; display:flex; align-items:center; justify-content:center; color:#555; background:#111;">TikTok Player</div><div class="video-info"><b>${v.name}</b><br>${v.desc}</div></div>`;
            });
        } else {
            g.className = isGrid ? "main-grid grid-view" : "main-grid list-view";
            f.forEach(t => {
                let n = typeof t.name === 'object' ? t.name[currentLang] : t.name;
                let d = typeof t.desc === 'object' ? t.desc[currentLang] : t.desc;
                g.innerHTML += `<div class="card"><h3>${n}</h3><p>${d}</p><a href="${t.link}" target="_blank" class="btn">${uiStrings[currentLang].enter}</a></div>`;
            });
        }
    }

    if (localStorage.getItem('theme') === 'light') toggleTheme();
    changeLang('ar');
</script>
</body>
</html>
