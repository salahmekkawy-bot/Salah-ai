<!DOCTYPE html>
<html id="mainHtml" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - Ultimate Hub</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#7c3aed">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f1a; --card-bg: rgba(20, 26, 42, 0.9); --nav-bg: rgba(0,0,0,0.4);
            --accent: #7c3aed; --neon: #00f2ff; --text: #e2e8f0; --soccer: #10b981; --red: #f43f5e;
            --yt: #ff0000; --fb: #1877f2; --tk: #ffffff;
        }
        body.light-mode {
            --bg: #f1f5f9; --card-bg: rgba(255, 255, 255, 0.95); --nav-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a; --accent: #6d28d9; --neon: #7c3aed;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; transition: 0.3s; overflow-x: hidden; }
        
        .header { text-align: center; padding: 20px; position: relative; }
        .top-controls { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 1001; }
        .theme-toggle { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); color: var(--text); padding: 10px; border-radius: 50%; cursor: pointer; width: 40px; height: 40px; }

        .status-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 10px; }
        #digitalClock { font-size: 35px; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--accent); }
        .weather-box { background: var(--card-bg); padding: 8px 15px; border-radius: 50px; border: 1px solid var(--neon); display: flex; align-items: center; gap: 8px; font-size: 14px; }
        .weather-box select { background: none; border: none; color: var(--text); cursor: pointer; outline: none; font-weight: bold; }

        .wisdom-strip { max-width: 600px; margin: 0 auto 15px; background: rgba(124, 58, 237, 0.1); padding: 10px; border-radius: 50px; border: 1px dashed var(--accent); font-size: 13px; font-style: italic; text-align: center; }

        .main-logo { width: 65px; height: 65px; margin-bottom: 5px; filter: drop-shadow(0 0 15px var(--neon)); animation: float 3s infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .action-btns { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .btn-top { border: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .install-btn { background: linear-gradient(45deg, #7c3aed, #00f2ff); box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4); }
        .share-btn { background: linear-gradient(45deg, #25d366, #128c7e); box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3); }

        /* منطقة الفيديوهات والعداد */
        .promo-area { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; padding: 0 20px; max-width: 1100px; margin: 0 auto 25px; }
        .promo-card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .promo-card h4 { margin: 0 0 10px; font-size: 12px; color: var(--neon); text-transform: uppercase; }
        .video-box { border-radius: 12px; overflow: hidden; height: 160px; background: #000; }
        .countdown { display: flex; justify-content: center; gap: 8px; font-weight: bold; font-size: 20px; color: var(--red); margin-top: 10px; }

        /* الأقسام */
        .categories-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 15px; padding: 20px; max-width: 900px; margin: 0 auto; }
        .folder-card { background: var(--card-bg); border-radius: 20px; padding: 25px 10px; text-align: center; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .folder-card:hover { transform: translateY(-5px); border-color: var(--neon); }
        .folder-card i { font-size: 35px; color: var(--neon); margin-bottom: 12px; display: block; }
        .folder-card span { font-weight: bold; font-size: 15px; }

        /* عرض الأدوات */
        #toolsView { display: none; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .back-nav { color: var(--neon); cursor: pointer; font-weight: bold; margin-bottom: 25px; display: inline-block; font-size: 18px; }
        .items-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .item-card { background: var(--card-bg); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); position: relative; }
        .item-card h3 { color: var(--neon); margin: 0 0 10px; font-size: 19px; }
        .item-card p { font-size: 13px; color: #94a3b8; height: 40px; overflow: hidden; margin-bottom: 15px; }
        .btn-action { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .copy-tag { position: absolute; top: 15px; left: 15px; background: var(--soccer); color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; cursor: pointer; }

        .footer { text-align: center; padding: 50px 20px; opacity: 0.6; font-size: 13px; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body id="body">

<div class="header">
    <div class="top-controls">
        <div class="theme-toggle" onclick="toggleTheme()"><i id="themeIcon" class="fas fa-moon"></i></div>
    </div>
    
    <div class="status-bar">
        <div id="digitalClock">00:00:00</div>
        <div class="weather-box">
            <i class="fas fa-temperature-high"></i>
            <select id="weatherSelect">
                <option>المنيا 24°C</option><option>القاهرة 27°C</option><option>الإسكندرية 21°C</option><option>أسوان 32°C</option>
            </select>
        </div>
    </div>

    <div class="wisdom-strip" id="wisdom">"الأمل هو المحرك الذي يجعلنا نبدع في عالم الأنميشن."</div>

    <svg class="main-logo" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" stroke="var(--accent)" stroke-width="4" fill="none" />
        <path d="M35 50 L45 60 L65 40" stroke="var(--neon)" stroke-width="8" stroke-linecap="round" fill="none" />
    </svg>
    <h1 style="margin:0;">Salah Mekkawey</h1>

    <div class="action-btns">
        <button class="btn-top install-btn" id="installBtn"><i class="fas fa-download"></i> Install App</button>
        <button class="btn-top share-btn" onclick="shareSite()"><i class="fas fa-share-alt"></i> Share Site</button>
    </div>
</div>

<div id="homeUI">
    <div class="promo-area">
        <div class="promo-card">
            <h4><i class="fab fa-youtube"></i> YouTube Latest</h4>
            <div class="video-box">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
        <div class="promo-card">
            <h4><i class="fab fa-tiktok"></i> TikTok Feed</h4>
            <div class="video-box">
                <iframe width="100%" height="100%" src="https://www.tiktok.com/player/v1/7345678901234567890" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
        <div class="promo-card">
            <h4><i class="fas fa-stopwatch"></i> Match Timer</h4>
            <div class="countdown" id="timer">00 : 00 : 00</div>
            <p style="font-size: 11px; margin-top: 10px; opacity: 0.7; color: var(--red);">الأهلي vs الزمالك - القمة تقترب!</p>
        </div>
    </div>

    <div class="categories-grid">
        <div class="folder-card" onclick="openCat('social')"><i class="fas fa-share-alt"></i><span>قنواتي</span></div>
        <div class="folder-card" onclick="openCat('ai')"><i class="fas fa-robot"></i><span>ذكاء اصطناعي</span></div>
        <div class="folder-card" onclick="openCat('prompts')"><i class="fas fa-magic"></i><span>الأوامر</span></div>
        <div class="folder-card" onclick="openCat('sports')"><i class="fas fa-futbol"></i><span>الرياضة</span></div>
        <div class="folder-card" onclick="openCat('news')"><i class="fas fa-newspaper"></i><span>الأخبار</span></div>
        <div class="folder-card" onclick="openCat('soft')"><i class="fas fa-desktop"></i><span>البرامج</span></div>
    </div>
</div>

<div id="toolsView">
    <div class="back-nav" onclick="goHome()"><i class="fas fa-arrow-right"></i> رجوع للرئيسية</div>
    <h2 id="viewTitle" style="text-align: center; color: var(--neon); margin-bottom: 25px;"></h2>
    <div class="items-grid" id="itemsGrid"></div>
</div>

<div class="footer">© 2026 Salah Mekkawey | The Ultimate Animation & Tech Hub</div>

<script>
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    function updateClock() {
        document.getElementById('digitalClock').innerText = new Date().toLocaleTimeString('ar-EG');
    }
    setInterval(updateClock, 1000); updateClock();

    function setWisdom() {
        const w = ["النجاح يبدأ بخطوة، والأنميشن يبدأ بفكرة.", "بندق ولوزة: الصبر يحقق المستحيل.", "كن فخوراً بمكانك، المنيا بلد المبدعين.", "الذكاء الاصطناعي صديق المبدع الذكي."];
        document.getElementById('wisdom').innerText = `"${w[Math.floor(Math.random()*w.length)]}"`;
    }
    setWisdom();

    const data = [
        { cat:'social', name:'YouTube', desc:'قناتي للأنميشن والرياضة.', link:'https://youtube.com/@SalahMekkawey' },
        { cat:'social', name:'Facebook', desc:'أحدث المنشورات اليومية.', link:'#' },
        { cat:'social', name:'TikTok', desc:'فيديوهات قصيرة وحصرية.', link:'#' },

        { cat:'sports', name:'Yacine TV', desc:'البث المباشر للمباريات.', link:'https://yacineapp.tv/' },
        { cat:'sports', name:'Kora Live', desc:'تغطية حية للمباريات.', link:'https://koora-live.me/' },
        { cat:'sports', name:'Yalla Kora', desc:'نتائج ومواعيد دقيقة.', link:'https://www.yallakora.com/' },
        { cat:'sports', name:'365Scores', desc:'تنبيهات أهداف فورية.', link:'https://www.365scores.com' },
        { cat:'sports', name:'FilGoal', desc:'أخبار الكورة المصرية.', link:'https://www.filgoal.com' },

        { cat:'news', name:'Sky News', desc:'أخبار العالم والسياسة.', link:'https://www.skynewsarabia.com' },
        { cat:'news', name:'اليوم السابع', desc:'أخبار مصر والتريند.', link:'https://www.youm7.com' },
        { cat:'news', name:'CNBC', desc:'تحليلات المال والبورصة.', link:'https://www.cnbcarabia.com' },
        { cat:'news', name:'مصراوي', desc:'أخبار اجتماعية وفنية.', link:'https://www.masrawy.com' },

        { cat:'ai', name:'ChatGPT', desc:'مساعد نصوص وبرمجة.', link:'https://chat.openai.com' },
        { cat:'ai', name:'Leonardo AI', desc:'تصميم صور كرتونية.', link:'https://leonardo.ai' },
        { cat:'ai', name:'ElevenLabs', desc:'تعليق صوتي واقعي.', link:'https://elevenlabs.io' },

        { cat:'prompts', name:'Pixar Avatar', copy:'3D Pixar style character, young man, glowing eyes, cinematic lighting, 8k.', desc:'لعمل صورة شخصية كرتونية.' },
        { cat:'prompts', name:'Majestic Cat', copy:'Highly detailed portrait of a cat king, royal crown, purple background, 8k.', desc:'لعمل صور قطط ملكية.' }
    ];

    for(let i=1; i<=48; i++) { data.push({ cat:'ai', name:'AI Tool '+i, desc:'أداة ذكاء اصطناعي إضافية رقم '+i, link:'#' }); }

    function openCat(c) {
        document.getElementById('homeUI').style.display = 'none';
        const grid = document.getElementById('itemsGrid');
        grid.innerHTML = data.filter(i => i.cat === c).map(i => `
            <div class="item-card">
                ${i.copy ? `<span class="copy-tag" onclick="copyP('${i.copy}')">نسخ الأمر</span>` : ''}
                <h3>${i.name}</h3>
                <p>${i.desc}</p>
                ${i.link ? `<button class="btn-action" onclick="window.open('${i.link}', '_blank')">دخول الآن</button>` : ''}
            </div>
        `).join('');
        const titles = { social:'قنواتي الرسمية', ai:'أدوات الذكاء الاصطناعي', sports:'رياضة مباشر', news:'أخبار اليوم', games:'ألعاب ذكية', soft:'برامج الكمبيوتر', prompts:'مكتبة الأوامر' };
        document.getElementById('viewTitle').innerText = titles[c];
        document.getElementById('toolsView').style.display = 'block';
        window.scrollTo(0,0);
    }

    function goHome() {
        document.getElementById('toolsView').style.display = 'none';
        document.getElementById('homeUI').style.display = 'block';
    }

    function copyP(t) { navigator.clipboard.writeText(t); alert('تم نسخ الأمر بنجاح!'); }

    function toggleTheme() {
        document.body.classList.toggle('light-mode');
        document.getElementById('themeIcon').className = document.body.classList.contains('light-mode') ? 'fas fa-sun' : 'fas fa-moon';
    }

    function initTimer() {
        const target = new Date("April 15, 2026 21:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const d = target - now;
            const h = Math.floor((d % (1000*60*60*24)) / (1000*60*60));
            const m = Math.floor((d % (1000*60*60)) / (1000*60));
            const s = Math.floor((d % (1000*60)) / 1000);
            document.getElementById('timer').innerText = `${h}h : ${m}m : ${s}s`;
        }, 1000);
    }
    initTimer();

    function shareSite() {
        const shareData = { title: 'Salah Mekkawey Hub', text: 'شوف تطبيق صلاح مكاوي للأدوات الذكية والرياضة!', url: window.location.href };
        if (navigator.share) { navigator.share(shareData); } 
        else { window.open(`https://wa.me/?text=شوف تطبيق صلاح مكاوي الرهيب: ${window.location.href}`, '_blank'); }
    }

    let defP; window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defP = e; });
    document.getElementById('installBtn').onclick = () => { if(defP) defP.prompt(); else alert('افتح القائمة واختار Install App'); };
</script>
</body>
</html>
