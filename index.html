<!DOCTYPE html>
<html id="mainHtml" lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - AI & Sports Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تعريف الألوان (الوضع الليلي الافتراضي) */
        :root {
            --bg: #0b0f1a;
            --card-bg: rgba(20, 26, 42, 0.8);
            --nav-bg: rgba(0,0,0,0.4);
            --accent: #7c3aed;
            --neon: #00f2ff;
            --text: #e2e8f0;
            --soccer: #10b981;
            --red: #f43f5e;
            --trans: 0.3s ease;
        }

        /* تعريف ألوان الوضع النهاري */
        body.light-mode {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.9);
            --nav-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --accent: #6d28d9;
            --neon: #7c3aed;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; min-height: 100vh;
            transition: background var(--trans), color var(--trans);
            background-attachment: fixed;
        }

        /* الهيدر والأزرار العلوية */
        .header { text-align: center; padding: 25px 20px; position: relative; }
        
        .top-controls {
            position: absolute; top: 20px; left: 20px;
            display: flex; gap: 10px; align-items: center; z-index: 1000;
        }
        [dir="ltr"] .top-controls { left: auto; right: 20px; }

        .lang-switcher, .theme-toggle {
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text); padding: 10px; border-radius: 12px; cursor: pointer;
            backdrop-filter: blur(10px); font-size: 14px; display: flex; align-items: center;
        }

        .main-logo {
            width: 80px; height: 80px; margin: 0 auto 10px;
            filter: drop-shadow(0 0 10px var(--neon));
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* الأقسام Navigation */
        .nav-container {
            display: flex; gap: 10px; overflow-x: auto;
            padding: 15px; justify-content: flex-start; scrollbar-width: none;
            background: var(--nav-bg); border-bottom: 1px solid rgba(0,0,0,0.05);
            backdrop-filter: blur(15px); sticky; top: 0; z-index: 999;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: var(--card-bg); padding: 12px 20px; border-radius: 15px;
            cursor: pointer; transition: var(--trans); border: 1px solid rgba(0,0,0,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px; font-weight: 600;
        }
        .nav-btn.active { background: var(--accent); color: white; border-color: var(--neon); }

        /* الكروت والمحتوى */
        .controls { max-width: 800px; margin: 25px auto; padding: 0 20px; display: flex; gap: 10px; }
        .search-bar { flex: 1; padding: 15px 25px; border-radius: 100px; background: var(--card-bg); border: 1px solid rgba(0,0,0,0.1); color: var(--text); outline: none; }
        
        .main-grid { display: grid; gap: 20px; padding: 0 20px; max-width: 1200px; margin: 0 auto 60px; }
        .grid-view { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        .list-view { grid-template-columns: 1fr; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px; border: 1px solid rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin: 0 0 8px; color: var(--neon); }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 15px; }

        .footer { text-align: center; padding: 40px; opacity: 0.7; border-top: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body id="body">

<div class="header">
    <div class="top-controls">
        <select class="lang-switcher" id="langSelect" onchange="changeLang(this.value)">
            <option value="ar">العربية 🇪🇬</option>
            <option value="en">English 🇺🇸</option>
            <option value="fr">Français 🇫🇷</option>
        </select>
        <div class="theme-toggle" onclick="toggleTheme()">
            <i id="themeIcon" class="fas fa-moon"></i>
        </div>
    </div>
    
    <svg class="main-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" stroke="url(#paint0_linear)" stroke-width="4"/>
        <path d="M30 50L45 65L75 35" stroke="#00f2ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M50 20V30M50 70V80M20 50H30M70 50H80" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
        <defs>
            <linearGradient id="paint0_linear" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
                <stop stop-color="#7c3aed"/><stop offset="1" stop-color="#00f2ff"/>
            </linearGradient>
        </defs>
    </svg>
    <h1 id="ui-title">صلاح مكاوي</h1>
</div>

<div class="nav-container" id="navContainer"></div>

<div class="controls">
    <input type="text" id="search" class="search-bar" placeholder="...">
    <div class="theme-toggle" onclick="toggleView()"><i class="fas fa-th-list"></i></div>
</div>

<div class="main-grid grid-view" id="mainGrid"></div>

<div class="footer">
    <p id="ui-footer">© 2026 Salah Mekkawey | Global Hub</p>
</div>

<script>
    // نظام اللغات
    const uiStrings = {
        ar: { title: "صلاح مكاوي", search: "ابحث هنا...", ai: "ذكاء اصطناعي", sports: "رياضة مباشر", news: "أخبار اليوم", games: "ألعاب", soft: "برامج", ads: "إعلانات", footer: "© 2026 صلاح مكاوي | جميع الحقوق محفوظة", enter: "دخول الآن" },
        en: { title: "Salah Mekkawey", search: "Search here...", ai: "AI Tools", sports: "Sports", news: "News", games: "Games", soft: "Software", ads: "Ads", footer: "© 2026 Salah Mekkawey | All Rights Reserved", enter: "Access" },
        fr: { title: "Salah Mekkawey", search: "Chercher...", ai: "IA Outils", sports: "Sports", news: "Actus", games: "Jeux", soft: "Logiciels", ads: "Pub", footer: "© 2026 Salah Mekkawey | Tous droits réservés", enter: "Entrer" }
    };

    // البيانات (رياضة وأدوات)
    const items = [
        { cat:'sports', name:{ar:'ياسين تيفي (Yacine TV)', en:'Yacine TV', fr:'Yacine TV'}, desc:{ar:'بث مباشر للمباريات والقنوات الرياضية.', en:'Live sports streaming.', fr:'Sports en direct.'}, link:'https://yacineapp.tv/' },
        { cat:'sports', name:{ar:'كورة لايف (Kora Live)', en:'Kora Live', fr:'Kora Live'}, desc:{ar:'تغطية حية لجميع مباريات اليوم.', en:'Live match coverage.', fr:'Matchs en direct.'}, link:'https://koora-live.me/' },
        { cat:'ai', name:{ar:'ChatGPT', en:'ChatGPT', fr:'ChatGPT'}, desc:{ar:'ملك النصوص والبرمجة والتأليف.', en:'AI Writing master.', fr:'Maître de l\'IA.'}, link:'https://chat.openai.com' },
        { cat:'ai', name:{ar:'Leonardo AI', en:'Leonardo AI', fr:'Leonardo AI'}, desc:{ar:'تصميم شخصيات كرتون احترافية.', en:'Cartoon design.', fr:'Dessin animé.'}, link:'https://leonardo.ai' }
        // ... (بقية الأدوات)
    ];

    let currentLang = 'ar';
    let currentCat = 'ai';
    let isGrid = true;

    // وظيفة تبديل الوضع (ليلي/نهاري)
    function toggleTheme() {
        const body = document.getElementById('body');
        const icon = document.getElementById('themeIcon');
        body.classList.toggle('light-mode');
        
        if (body.classList.contains('light-mode')) {
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'light');
        } else {
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'dark');
        }
    }

    function changeLang(lang) {
        currentLang = lang;
        document.getElementById('mainHtml').dir = (lang === 'ar') ? 'rtl' : 'ltr';
        document.getElementById('ui-title').innerText = uiStrings[lang].title;
        document.getElementById('search').placeholder = uiStrings[lang].search;
        document.getElementById('ui-footer').innerText = uiStrings[lang].footer;
        renderNav();
        render();
    }

    function renderNav() {
        const nav = document.getElementById('navContainer');
        const cats = ['ai', 'sports', 'news', 'games', 'soft', 'ads'];
        const icons = { ai: 'robot', sports: 'futbol', news: 'newspaper', games: 'gamepad', soft: 'desktop', ads: 'ad' };
        nav.innerHTML = cats.map(c => `
            <div class="nav-btn ${currentCat === c ? 'active' : ''}" onclick="setCat('${c}', this)">
                <i class="fas fa-${icons[c]}"></i> ${uiStrings[currentLang][c]}
            </div>`).join('');
    }

    function setCat(c, btn) {
        currentCat = c;
        renderNav();
        render();
    }

    function toggleView() {
        isGrid = !isGrid;
        document.getElementById('mainGrid').className = isGrid ? 'main-grid grid-view' : 'main-grid list-view';
    }

    function render(s = "") {
        const g = document.getElementById('mainGrid');
        g.innerHTML = "";
        const f = items.filter(t => t.cat === currentCat && t.name[currentLang].toLowerCase().includes(s.toLowerCase()));
        f.forEach(t => {
            g.innerHTML += `<div class="card"><h3>${t.name[currentLang]}</h3><p>${t.desc[currentLang]}</p><a href="${t.link}" target="_blank" class="btn">${uiStrings[currentLang].enter}</a></div>`;
        });
    }

    // التحقق من الثيم المحفوظ
    if (localStorage.getItem('theme') === 'light') toggleTheme();
    document.getElementById('search').addEventListener('input', e => render(e.target.value));
    changeLang('ar');
</script>
</body>
</html>
