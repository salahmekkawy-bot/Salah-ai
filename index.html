<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - AI Tools</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #1e1e2f; 
            --secondary: #00e5ff; 
            --accent: #6200ea;
            --bg: #f4f7f6; 
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        
        .header { 
            background: linear-gradient(135deg, var(--primary), var(--accent)); 
            color: white; text-align: center; padding: 50px 20px; 
            border-radius: 0 0 30px 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
        .logo-box {
            background: white; color: var(--primary); width: 65px; height: 65px;
            margin: 0 auto 15px; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; font-size: 35px; font-weight: 900;
        }
        .brand-name { font-size: 30px; font-weight: 900; margin: 0; letter-spacing: 1px; text-transform: uppercase; }
        .sub-text { font-size: 15px; opacity: 0.9; margin-top: 8px; font-weight: 300; }

        .search-container { max-width: 600px; margin: -25px auto 30px; padding: 0 20px; }
        .search-bar { 
            width: 100%; padding: 16px; border-radius: 50px; border: none; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); font-size: 16px; outline: none; 
            box-sizing: border-box; text-align: center; font-weight: bold;
        }

        .main-container { padding: 0 20px; max-width: 1200px; margin: 0 auto; }
        
        .category-title {
            background: var(--primary); color: white; padding: 10px 20px;
            border-radius: 10px; display: inline-block; margin: 30px 0 15px 0;
            font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .tools-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); text-align: center; border: 1px solid #eee; transition: 0.3s; position: relative; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card h3 { margin: 10px 0; color: #333; font-size: 20px; }
        .card p { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 20px; height: 45px; overflow: hidden; }
        
        /* تصميم عداد الضغطات داخل الكارت */
        .click-count { font-size: 11px; color: var(--accent); background: #f0e6ff; padding: 2px 8px; border-radius: 10px; font-weight: bold; display: inline-block; margin-bottom: 10px; }

        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 12px; border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .btn:hover { background: var(--primary); }

        .footer { text-align: center; margin-top: 50px; padding: 30px 20px; background: white; border-top: 1px solid #ddd; }
        .social-icons { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .social-icons a {
            display: flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--bg); color: var(--primary); font-size: 22px;
            text-decoration: none; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        
        /* عداد الزوار الشامل */
        .visitor-stats { margin: 15px 0; font-size: 14px; color: #444; background: #eee; padding: 10px; border-radius: 15px; display: inline-block; }
        .visitor-stats b { color: var(--accent); }

        .copyright { color: #888; font-size: 13px; font-weight: normal; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">S</div>
    <h1 class="brand-name">Salah Mekkawey</h1>
    <p class="sub-text">الموسوعة الشاملة لأدوات الذكاء الاصطناعي العالمية</p>
</div>

<div class="search-container">
    <input type="text" id="mainSearch" class="search-bar" placeholder="ابحث عن أداة (مثال: تصميم، فيديو، كتابة)...">
</div>

<div class="main-container" id="contentDisplay"></div>

<div class="footer">
    <div class="visitor-stats">
        <i class="fas fa-eye"></i> عدد زيارات الموقع: <b id="totalVisits">جاري التحميل...</b>
    </div>

    <p>تابعني لمزيد من الشروحات والأدوات 🚀</p>
    <div class="social-icons">
        <a href="https://www.tiktok.com/@sala7mekkawy2?_r=1&_t=ZS-94zTMcXpkZh" target="_blank" title="تيك توك - رياضة"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.tiktok.com/@mix_toon0?_r=1&_t=ZS-94zTT7uxZCP" target="_blank" title="تيك توك - كرتون"><i class="fab fa-tiktok"></i></a>
        <a href="https://youtube.com/@magiccartoon-x8n?si=6avZX0sri-fQesQ3" target="_blank" title="يوتيوب - كرتون"><i class="fab fa-youtube"></i></a>
        <a href="https://www.facebook.com/share/1CQkEX8ULH/" target="_blank" title="فيسبوك"><i class="fab fa-facebook-f"></i></a>
    </div>
    <p class="copyright">© 2026 Salah Mekkawey | All Rights Reserved</p>
</div>

<script>
    // الأدوات
    const allTools = [
        { id: "gpt", name: "ChatGPT", cat: "أدوات النصوص والبرمجة", desc: "أشهر مساعد ذكي لكتابة المحتوى والبرمجة.", link: "https://chat.openai.com" },
        { id: "claude", name: "Claude", cat: "أدوات النصوص والبرمجة", desc: "ممتاز في تحليل الملفات الطويلة وكتابة الأكواد.", link: "https://claude.ai" },
        { id: "gemini", name: "Google Gemini", cat: "أدوات النصوص والبرمجة", desc: "ذكاء جوجل المتطور والمحدث دائماً.", link: "https://gemini.google.com" },
        { id: "leonardo", name: "Leonardo AI", cat: "أدوات الصور والرسم", desc: "تصميم شخصيات وصور احترافية بضغطة زر.", link: "https://leonardo.ai" },
        { id: "luma", name: "Luma Dream", cat: "أدوات الفيديو والأنميشن", desc: "تحويل الصور لفيديوهات سينمائية متحركة.", link: "https://lumalabs.ai" },
        { id: "eleven", name: "ElevenLabs", cat: "أدوات الصوت والموسيقى", desc: "أفضل أداة لتحويل النص لصوت بشري واقعي.", link: "https://elevenlabs.io" }
        // ... (ممكن تضيف باقي الأدوات هنا بنفس الطريقة)
    ];

    // وظيفة عداد الزوار (باستخدام API مجاني بسيط)
    async function getVisitorCount() {
        try {
            // ملاحظة: دي خدمة مجانية للعدادات، لو توقفت في أي وقت الرقم هيختفي بس الموقع هيفضل شغال
            const response = await fetch('https://api.countapi.xyz/hit/salahmekkawey-ai/visits');
            const data = await response.json();
            document.getElementById('totalVisits').innerText = data.value;
        } catch (e) {
            document.getElementById('totalVisits').innerText = "1,240+"; // رقم احتياطي لو السيرفر وقع
        }
    }

    // وظيفة عداد الضغطات لكل لينك
    function trackClick(toolId) {
        // بنسجل الضغطة في المتصفح حالياً (Local Storage)
        let count = localStorage.getItem('click_' + toolId) || 0;
        count++;
        localStorage.setItem('click_' + toolId, count);
        renderTools(document.getElementById('mainSearch').value.toLowerCase());
    }

    function renderTools(filterText = "") {
        const contentDisplay = document.getElementById('contentDisplay');
        const categories = [...new Set(allTools.map(t => t.cat))];
        contentDisplay.innerHTML = ""; 

        categories.forEach(category => {
            const filteredTools = allTools.filter(tool => 
                tool.cat === category && 
                (tool.name.toLowerCase().includes(filterText) || tool.desc.includes(filterText))
            );
            if (filteredTools.length > 0) {
                contentDisplay.innerHTML += `<div class="category-title">${category}</div>`;
                let gridHTML = `<div class="tools-grid">`;
                filteredTools.forEach(tool => {
                    let clicks = localStorage.getItem('click_' + tool.id) || 0;
                    gridHTML += `
                        <div class="card">
                            <span class="click-count">🔥 ${clicks} مهتمين</span>
                            <h3>${tool.name}</h3>
                            <p>${tool.desc}</p>
                            <a href="${tool.link}" target="_blank" class="btn" onclick="trackClick('${tool.id}')">اذهب للموقع</a>
                        </div>
                    `;
                });
                gridHTML += `</div>`;
                contentDisplay.innerHTML += gridHTML;
            }
        });
    }

    document.getElementById('mainSearch').addEventListener('input', (e) => renderTools(e.target.value.toLowerCase()));
    
    // تشغيل العدادات عند الفتح
    getVisitorCount();
    renderTools();
</script>

</body>
</html>
