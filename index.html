<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - Ultimate Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #8b5cf6;
            --neon: #00f2ff;
            --text: #f8fafc;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; min-height: 100vh;
            background-image: radial-gradient(circle at 10% 10%, #1e1b4b 0%, #0f172a 100%);
        }

        .header { text-align: center; padding: 40px 20px; }
        .logo-box { font-size: 40px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        /* شريط الأقسام السلس */
        .nav-container {
            display: flex; gap: 12px; overflow-x: auto;
            padding: 20px; justify-content: flex-start; scrollbar-width: none;
        }
        .nav-container::-webkit-scrollbar { display: none; }
        
        .nav-btn {
            background: var(--card); padding: 12px 20px; border-radius: 15px;
            cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05);
            white-space: nowrap; display: flex; align-items: center; gap: 8px;
        }
        .nav-btn i { color: var(--accent); }
        .nav-btn.active { background: var(--accent); border-color: var(--neon); box-shadow: 0 0 15px rgba(139, 92, 246, 0.4); }

        /* التحكم في البحث وطريقة العرض */
        .controls {
            max-width: 800px; margin: 0 auto 30px; padding: 0 20px;
            display: flex; gap: 10px; align-items: center;
        }
        .search-bar { flex: 1; padding: 15px; border-radius: 50px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: white; outline: none; }
        .view-toggle { width: 50px; height: 50px; border-radius: 50%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); color: var(--neon); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* منطقة المحتوى */
        .main-grid {
            display: grid; gap: 20px; padding: 0 20px; max-width: 1200px; margin: 0 auto 50px;
            transition: 0.5s ease;
        }
        
        /* ستايل الشبكة (Grid) */
        .grid-view { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        
        /* ستايل القائمة (List) */
        .list-view { grid-template-columns: 1fr; }
        .list-view .card { display: flex; align-items: center; justify-content: space-between; text-align: right; padding: 15px 25px; }
        .list-view .card p { margin: 0 20px; height: auto; flex: 1; }
        .list-view .btn { width: auto; min-width: 120px; margin: 0; }

        .card {
            background: var(--card); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            animation: fadeIn 0.5s ease forwards;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card h3 { margin: 0 0 8px; font-size: 18px; color: var(--neon); }
        .card p { font-size: 13px; color: #94a3b8; height: 40px; overflow: hidden; }
        .btn { display: block; background: var(--accent); color: white; text-decoration: none; padding: 10px; border-radius: 12px; text-align: center; font-weight: bold; margin-top: 10px; transition: 0.3s; }
        .btn:hover { filter: brightness(1.2); }

        .footer { text-align: center; padding: 40px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo-box">S</div>
    <h1>Salah Mekkawey Dashboard</h1>
    <p>كل كنوز الإنترنت في مكان واحد</p>
</div>

<div class="nav-container">
    <div class="nav-btn active" onclick="setCat('ai', this)"><i class="fas fa-robot"></i> الذكاء الاصطناعي (50+)</div>
    <div class="nav-btn" onclick="setCat('news', this)"><i class="fas fa-globe"></i> الأخبار الشاملة</div>
    <div class="nav-btn" onclick="setCat('games', this)"><i class="fas fa-gamepad"></i> الألعاب</div>
    <div class="nav-btn" onclick="setCat('soft', this)"><i class="fas fa-download"></i> برامج مجانية</div>
    <div class="nav-btn" onclick="setCat('ads', this)"><i class="fas fa-ad"></i> عروض وإعلانات</div>
</div>

<div class="controls">
    <input type="text" id="search" class="search-bar" placeholder="ابحث عن أداة أو خبر...">
    <div class="view-toggle" id="toggleBtn" onclick="toggleView()"><i class="fas fa-th-list"></i></div>
</div>

<div class="main-grid grid-view" id="mainGrid"></div>

<div class="footer">
    <p>© 2026 Salah Mekkawey | All Rights Reserved</p>
</div>

        { cat:'ai', name:'Notion AI', desc:'تنظيم ملاحظات.', link:'https://notion.so' },
        { cat:'ai', name:'Krisp', desc:'عزل ضوضاء المايك.', link:'https://krisp.ai' },

        { cat:'ai', name:'Jasper Art', desc:'توليد فنون رقمية.', link:'https://jasper.ai/art' },
        { cat:'ai', name:'Stable Diffusion', desc:'رسم مفتوح المصدر.', link:'https://stablediffusionweb.com' },

        // أخبار
        { cat:'news', name:'الجزيرة (سياسة)', desc:'تغطية سياسية عالمية.', link:'https://aljazeera.net' },
        { cat:'news', name:'CNBC (اقتصاد)', desc:'أخبار المال والأعمال.', link:'https://cnbcarabia.com' },
        { cat:'news', name:'اليوم السابع', desc:'أخبار اجتماعية ومصرية.', link:'https://youm7.com' },
        { cat:'news', name:'هنداوي (ثقافة)', desc:'مقالات وكتب ثقافية.', link:'https://hindawi.org' },

        // ألعاب
        { cat:'games', name:'Quick Draw', desc:'ارسم وجوجل يخمن.', link:'https://quickdraw.withgoogle.com' },
        { cat:'games', name:'Akinator', desc:'المارد السحري.', link:'https://ar.akinator.com' },
        { cat:'games', name:'AI Dungeon', desc:'لعبة قصص خيالية.', link:'https://aidungeon.com' },
        { cat:'games', name:'Infinite Craft', desc:'اصنع عناصر كيميائية.', link:'https://neal.fun/infinite-craft/' },
        { cat:'games', name:'Emoji Scavenger', desc:'ابحث عن الإيموجي.', link:'https://emojiscavengerhunt.withgoogle.com/' },

        // عروض
        { cat:'ads', name:'مساحة إعلانية', desc:'تواصل معنا للإعلان هنا.', link:'#' }
    ];

    let currentCat = 'ai';
    let isGrid = true;

    function setCat(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    function toggleView() {
        isGrid = !isGrid;
        const grid = document.getElementById('mainGrid');
        const btn = document.getElementById('toggleBtn');
        grid.className = isGrid ? 'main-grid grid-view' : 'main-grid list-view';
        btn.innerHTML = isGrid ? '<i class="fas fa-th-list"></i>' : '<i class="fas fa-th-large"></i>';
    }

    function render(search = "") {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = "";
        const filtered = tools.filter(t => t.cat === currentCat && t.name.toLowerCase().includes(search.toLowerCase()));
        filtered.forEach(t => {
            grid.innerHTML += `
                <div class="card">
                    <h3>${t.name}</h3>
                    <p>${t.desc}</p>
                    <a href="${t.link}" target="_blank" class="btn">دخول</a>
                </div>
            `;
        });
    }

    document.getElementById('search').addEventListener('input', (e) => render(e.target.value));
    render();
</script>
</body>
</html>
