<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - Ultimate Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-glow: #8b5cf6;
            --text-main: #f8fafc;
            --neon-blue: #00f2ff;
            --soccer-green: #22c55e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        .hero { padding: 60px 20px; text-align: center; background: linear-gradient(to bottom, rgba(139, 92, 246, 0.2), transparent); }
        .logo-ring { width: 80px; height: 80px; border: 3px solid var(--neon-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; font-weight: 900; box-shadow: 0 0 20px var(--neon-blue); }

        .search-box { max-width: 500px; margin: -30px auto 40px; padding: 0 20px; }
        .search-bar { width: 100%; padding: 18px; background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; color: white; text-align: center; backdrop-filter: blur(10px); outline: none; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .category-header { font-size: 22px; font-weight: bold; margin: 40px 0 20px; padding-right: 15px; border-right: 4px solid var(--neon-blue); color: var(--neon-blue); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        .tool-card { background: var(--card-bg); backdrop-filter: blur(12px); border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s ease-in-out; position: relative; }
        .tool-card:hover { transform: translateY(-5px); border-color: var(--accent-glow); box-shadow: 0 0 15px rgba(139, 92, 246, 0.2); }

        .stat-badge { position: absolute; top: 15px; left: 15px; background: rgba(139, 92, 246, 0.3); color: var(--neon-blue); padding: 4px 10px; border-radius: 8px; font-size: 11px; }
        .visit-btn { display: block; width: 100%; padding: 12px; background: linear-gradient(90deg, var(--accent-glow), #6366f1); color: white; text-decoration: none; border-radius: 12px; font-weight: bold; text-align: center; margin-top: 15px; }
        
        /* لون خاص لزرار الماتشات */
        .match-btn { background: linear-gradient(90deg, var(--soccer-green), #15803d) !important; }

        .footer { margin-top: 80px; padding: 40px 20px; background: rgba(0,0,0,0.3); text-align: center; }
        .social-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .social-row a { color: #fff; font-size: 24px; opacity: 0.6; transition: 0.3s; }
        .social-row a:hover { opacity: 1; color: var(--neon-blue); }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo-ring">S</div>
    <h1>Salah Mekkawey Hub</h1>
    <p>بوابتك للأدوات الذكية، البرامج المجانية، وعالم كرة القدم</p>
</div>

<div class="search-box">
    <input type="text" id="mainSearch" class="search-bar" placeholder="ابحث عن أداة، ماتشات، أو برامج...">
</div>

<div class="container" id="contentDisplay"></div>

<div class="footer">
    <div class="social-row">
        <a href="https://www.tiktok.com/@sala7mekkawy2" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.tiktok.com/@mix_toon0" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://youtube.com/@magiccartoon-x8n" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://www.facebook.com/share/1CQkEX8ULH/" target="_blank"><i class="fab fa-facebook-f"></i></a>
    </div>
    <p>© 2026 Salah Mekkawey | All In One Platform</p>
</div>

<script>
    const allTools = [
        // قسم مباريات اليوم
        { id: "score1", name: "نتائج المباريات مباشر (Yalla Shoot)", cat: "ركن مباريات اليوم والدوريات", desc: "تابع نتائج مباريات اليوم والجدول لحظة بلحظة.", link: "https://www.yalla-shoot.com/live/" },
        { id: "score2", name: "مواعيد المباريات (FilGoal)", cat: "ركن مباريات اليوم والدوريات", desc: "أفضل تغطية للدوري المصري، الإنجليزي، ودوري أبطال أوروبا.", link: "https://www.filgoal.com/matches/" },
        { id: "score3", name: "ترتيب الدوريات (FlashScore)", cat: "ركن مباريات اليوم والدوريات", desc: "جدول ترتيب الدوريات العالمية والإحصائيات الكاملة.", link: "https://www.flashscore.com/" },

        // قسم الذكاء الاصطناعي
        { id: "leo", name: "Leonardo AI", cat: "أدوات الذكاء الاصطناعي", desc: "أقوى أداة لتوليد الصور والشخصيات باحترافية.", link: "https://leonardo.ai" },
        { id: "eleven", name: "ElevenLabs", cat: "أدوات الذكاء الاصطناعي", desc: "أفضل تعليق صوتي بشري في العالم.", link: "https://elevenlabs.io" },
        { id: "gpt", name: "ChatGPT", cat: "أدوات الذكاء الاصطناعي", desc: "مساعدك الشخصي لكتابة السكريبتات والأفكار.", link: "https://chat.openai.com" },

        // قسم البرامج المجانية
        { id: "soft2", name: "CapCut PC", cat: "برامج كمبيوتر مجانية", desc: "أسهل وأقوى برنامج مونتاج للفيديوهات القصيرة.", link: "https://www.capcut.com/desktop/" },
        { id: "soft3", name: "OBS Studio", cat: "برامج كمبيوتر مجانية", desc: "برنامج مجاني لتصوير الشاشة والبث المباشر.", link: "https://obsproject.com/" },

        // قسم الألعاب
        { id: "game1", name: "Akinator", cat: "ألعاب ذكية ومسلية", desc: "المارد السحري اللي بيعرف أنت بتفكر في مين.", link: "https://ar.akinator.com/" },

        // قسم المكتبة
        { id: "pdf1", name: "مكتبة هنداوي", cat: "ركن القراءة وكتب PDF", desc: "تحميل آلاف الكتب والروايات مجاناً وبشكل قانوني.", link: "https://www.hindawi.org/books/" }
    ];

    function track(id) {
        let n = parseInt(localStorage.getItem('c_'+id) || 0) + 1;
        localStorage.setItem('c_'+id, n);
        render(document.getElementById('mainSearch').value.toLowerCase());
    }

    function render(f = "") {
        const out = document.getElementById('contentDisplay');
        const cats = ["ركن مباريات اليوم والدوريات", "أدوات الذكاء الاصطناعي", "برامج كمبيوتر مجانية", "ألعاب ذكية ومسلية", "ركن القراءة وكتب PDF"];
        out.innerHTML = "";
        cats.forEach(c => {
            const tools = allTools.filter(t => t.cat === c && (t.name.toLowerCase().includes(f) || t.desc.includes(f)));
            if (tools.length > 0) {
                out.innerHTML += `<div class="category-header">${c}</div><div class="grid">` + 
                tools.map(t => {
                    let clicks = localStorage.getItem('c_'+t.id) || 0;
                    // تمييز زرار الماتشات بلون أخضر
                    let btnClass = t.cat === "ركن مباريات اليوم والدوريات" ? "visit-btn match-btn" : "visit-btn";
                    return `
                    <div class="tool-card">
                        <span class="stat-badge"><i class="fas fa-chart-line"></i> ${clicks}</span>
                        <h3>${t.name}</h3>
                        <p>${t.desc}</p>
                        <a href="${t.link}" target="_blank" class="${btnClass}" onclick="track('${t.id}')">شاهد الآن / دخول</a>
                    </div>`;
                }).join('') + `</div>`;
            }
        });
    }

    document.getElementById('mainSearch').addEventListener('input', e => render(e.target.value.toLowerCase()));
    render();
</script>
</body>
</html>
