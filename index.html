    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* الألوان والأساسيات */
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-glow: #8b5cf6;
            --text-main: #f8fafc;
            --neon-blue: #00f2ff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #0f172a 100%);
        }

        /* الهيدر بتأثير احترافي */
        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(to bottom, rgba(139, 92, 246, 0.2), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-ring {
            width: 80px; height: 80px;
            border: 3px solid var(--neon-blue);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px; font-weight: 900;
            box-shadow: 0 0 20px var(--neon-blue);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--neon-blue); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px var(--neon-blue); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--neon-blue); }
        }

        .hero h1 { font-size: 35px; margin: 0; letter-spacing: 2px; }
        .hero p { opacity: 0.7; font-weight: 300; margin-top: 10px; }

        /* شريط البحث */
        .search-box {
            max-width: 500px; margin: -30px auto 40px; padding: 0 20px;
        }
        .search-bar {
            width: 100%; padding: 18px 25px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            color: white; font-size: 16px;
            backdrop-filter: blur(10px);
            outline: none; transition: 0.3s;
            text-align: center;
        }
        .search-bar:focus { border-color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }

        /* الحاوية وتنسيق الكروت */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        
        .category-header {
            font-size: 22px; font-weight: bold;
            margin: 40px 0 20px; padding-right: 15px;
            border-right: 4px solid var(--neon-blue);
            color: var(--neon-blue);
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

        .tool-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 24px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden;
        }
        .tool-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent-glow);
            box-shadow: 0 10px 30px rgba(139, 92, 246, 0.2);
        }

        .tool-card h3 { margin: 0 0 10px 0; font-size: 20px; color: #fff; }
        .tool-card p { font-size: 14px; color: #94a3b8; line-height: 1.6; height: 45px; margin-bottom: 20px; }

        .stat-badge {
            position: absolute; top: 15px; left: 15px;
            background: rgba(139, 92, 246, 0.2);
            color: var(--accent-glow);
            padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold;
        }

        .visit-btn {
            display: block; width: 100%; padding: 12px;
            background: linear-gradient(90deg, var(--accent-glow), #6366f1);
            color: white; text-decoration: none; border-radius: 14px;
            font-weight: bold; text-align: center; transition: 0.3s;
        }
        .visit-btn:hover { filter: brightness(1.2); letter-spacing: 1px; }

        .footer {
            margin-top: 80px; padding: 40px 20px;
            background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .visitor-pill {
            background: var(--card-bg); border: 1px solid var(--accent-glow);
            padding: 10px 25px; border-radius: 50px; display: inline-flex;
            align-items: center; gap: 10px; margin-bottom: 30px;
        }

        .social-row a {
            color: #fff; font-size: 24px; opacity: 0.6; transition: 0.3s;
        }
        .social-row a:hover { opacity: 1; transform: scale(1.2); color: var(--neon-blue); }

    async function fetchStats() {
        try {
            const res = await fetch('https://api.countapi.xyz/hit/salahmekkawey-ai/visits');
            const data = await res.json();
            document.getElementById('totalVisits').innerText = data.value.toLocaleString();
        } catch (e) { document.getElementById('totalVisits').innerText = "1,250+"; }
    }

    function track(id) {
        let n = parseInt(localStorage.getItem('c_'+id) || 0) + 1;
        localStorage.setItem('c_'+id, n);
        render(document.getElementById('mainSearch').value.toLowerCase());
    }

    function render(f = "") {
        const out = document.getElementById('contentDisplay');
        const cats = ["أدوات النصوص والبرمجة", "أدوات الصور والرسم", "أدوات الفيديو والأنميشن", "أدوات الصوت والموسيقى", "أدوات 3D والتصميم"];
        out.innerHTML = "";
        cats.forEach(c => {
            const tools = allTools.filter(t => t.cat === c && (t.name.toLowerCase().includes(f) || t.desc.includes(f)));
            if (tools.length > 0) {
                out.innerHTML += `<div class="category-header">${c}</div><div class="grid">` + 
                tools.map(t => {
                    let clicks = localStorage.getItem('c_'+t.id) || 0;
                    return `
                    <div class="tool-card">
                        <span class="stat-badge"><i class="fas fa-fire"></i> ${clicks} مهتم</span>
                        <h3>${t.name}</h3>
                        <p>${t.desc}</p>
                        <a href="${t.link}" target="_blank" class="visit-btn" onclick="track('${t.id}')">اكتشف الآن</a>
                    </div>`;
                }).join('') + `</div>`;
            }
        });
    }

    document.getElementById('mainSearch').addEventListener('input', e => render(e.target.value.toLowerCase()));
    fetchStats(); render();
</script>
