<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salah Mekkawey - Smart Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #8b5cf6;
            --neon: #00f2ff;
            --text: #f8fafc;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 20% 20%, #1e1b4b 0%, #0f172a 100%);
            min-height: 100vh;
        }

        /* الهيدر */
        .header { text-align: center; padding: 40px 20px; }
        .logo { font-size: 40px; font-weight: 900; color: var(--neon); text-shadow: 0 0 15px var(--neon); margin-bottom: 10px; }
        
        /* شريط الأيقونات (الأقسام) */
        .category-nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            overflow-x: auto;
            padding: 20px;
            white-space: nowrap;
            scrollbar-width: none;
        }
        .category-nav::-webkit-scrollbar { display: none; }

        .nav-item {
            background: var(--card);
            padding: 15px 25px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            min-width: 100px;
        }
        .nav-item i { font-size: 24px; display: block; margin-bottom: 8px; color: var(--accent); }
        .nav-item span { font-size: 13px; font-weight: bold; }
        .nav-item.active {
            background: var(--accent);
            border-color: var(--neon);
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
        }
        .nav-item.active i, .nav-item.active span { color: white; }

        /* منطقة البحث */
        .search-area { max-width: 600px; margin: 0 auto 30px; padding: 0 20px; }
        .search-input {
            width: 100%; padding: 15px; border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--card); color: white; text-align: center; outline: none;
        }

        /* شبكة الكروت */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }

        .card {
            background: var(--card); backdrop-filter: blur(10px);
            border-radius: 25px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--neon); }
        .card h3 { margin: 0 0 10px; font-size: 18px; }
        .card p { font-size: 13px; color: #94a3b8; height: 40px; overflow: hidden; }
        
        .btn {
            display: block; width: 100%; padding: 12px;
            background: linear-gradient(90deg, var(--accent), #6366f1);
            color: white; text-decoration: none; border-radius: 15px;
            font-weight: bold; text-align: center; margin-top: 15px;
        }

        .badge {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0, 242, 255, 0.1); color: var(--neon);
            padding: 4px 10px; border-radius: 10px; font-size: 10px;
        }

        .footer { text-align: center; padding: 40px; background: rgba(0,0,0,0.2); margin-top: 50px; }
        .social { margin-bottom: 20px; font-size: 24px; }
        .social a { color: white; margin: 0 15px; opacity: 0.6; transition: 0.3s; }
        .social a:hover { opacity: 1; color: var(--neon); }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">S</div>
    <h1>Salah Mekkawey Hub</h1>
    <p>كل ما تحتاجه في مكان واحد - منظم وذكي</p>
</div>

<div class="category-nav">
    <div class="nav-item active" onclick="filterCat('ai', this)">
        <i class="fas fa-robot"></i><span>ذكاء اصطناعي</span>
    </div>
    <div class="nav-item" onclick="filterCat('news', this)">
        <i class="fas fa-newspaper"></i><span>أخبار اليوم</span>
    </div>
    <div class="nav-item" onclick="filterCat('sports', this)">
        <i class="fas fa-futbol"></i><span>رياضة</span>
    </div>
    <div class="nav-item" onclick="filterCat('games', this)">
        <i class="fas fa-gamepad"></i><span>ألعاب</span>
    </div>
    <div class="nav-item" onclick="filterCat('books', this)">
        <i class="fas fa-book"></i><span>مكتبة PDF</span>
    </div>
    <div class="nav-item" onclick="filterCat('soft', this)">
        <i class="fas fa-desktop"></i><span>برامج</span>
    </div>
</div>

<div class="search-area">
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث في هذا القسم...">
</div>

<div class="container">
    <div class="grid" id="grid"></div>
</div>

<div class="footer">
    <div class="social">
        <a href="https://www.tiktok.com/@sala7mekkawy2" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://www.tiktok.com/@mix_toon0" target="_blank"><i class="fab fa-tiktok"></i></a>
        <a href="https://youtube.com/@magiccartoon-x8n" target="_blank"><i class="fab fa-youtube"></i></a>
        <a href="https://www.facebook.com/share/1CQkEX8ULH/" target="_blank"><i class="fab fa-facebook-f"></i></a>
    </div>
    <p>© 2026 Salah Mekkawey | All Rights Reserved</p>
</div>

<script>
    const data = [
        // ذكاء اصطناعي (أمثلة من الـ 50 موقع)
        { cat: 'ai', name: 'ChatGPT', desc: 'ملك النصوص والبرمجة.', link: 'https://chat.openai.com' },
        { cat: 'ai', name: 'Leonardo AI', desc: 'أفضل تصميم صور وشخصيات كرتون.', link: 'https://leonardo.ai' },
        { cat: 'ai', name: 'ElevenLabs', desc: 'تعليق صوتي بشري مذهل.', link: 'https://elevenlabs.io' },
        { cat: 'ai', name: 'Luma Labs', desc: 'تحويل الصور لفيديوهات خيالية.', link: 'https://lumalabs.ai' },
        { cat: 'ai', name: 'Claude AI', desc: 'مساعد ذكي جداً في تحليل البيانات.', link: 'https://claude.ai' },
        { cat: 'ai', name: 'Midjourney', desc: 'الأقوى في جودة الصور الفنية.', link: 'https://midjourney.com' },
        { cat: 'ai', name: 'D-ID', desc: 'تحريك الوجوه وجعل الصور تتكلم.', link: 'https://d-id.com' },
        { cat: 'ai', name: 'HeyGen', desc: 'إنشاء فيديوهات بمتحدث واقعي.', link: 'https://heygen.com' },
        { cat: 'ai', name: 'Adobe Firefly', desc: 'أدوات أدوبي للذكاء الاصطناعي.', link: 'https://firefly.adobe.com' },
        { cat: 'ai', name: 'Suno AI', desc: 'توليد أغاني وموسيقى كاملة.', link: 'https://suno.com' },

        // أخبار اليوم (سياسة، اقتصاد، ثقافة)
        { cat: 'news', name: 'أخبار السياسة (الجزيرة)', desc: 'متابعة آخر الأخبار السياسية العالمية.', link: 'https://www.aljazeera.net' },
        { cat: 'news', name: 'أخبار الاقتصاد (CNBC)', desc: 'تحليلات السوق والاقتصاد العالمي.', link: 'https://www.cnbcarabia.com' },
        { cat: 'news', name: 'أخبار الثقافة (هنداوي)', desc: 'مقالات ثقافية وأدبية وفلسفية.', link: 'https://www.hindawi.org/articles/' },
        { cat: 'news', name: 'الأخبار الاجتماعية (اليوم السابع)', desc: 'تغطية للمجتمع وأخبار الناس في مصر.', link: 'https://www.youm7.com' },
        { cat: 'news', name: 'سكاي نيوز عربية', desc: 'تغطية شاملة لكل أنواع الأخبار.', link: 'https://www.skynewsarabia.com' },

        // رياضة
        { cat: 'sports', name: 'يلا شوت', desc: 'نتائج المباريات وبث مباشر.', link: 'https://www.yalla-shoot.com' },
        { cat: 'sports', name: 'في الجول (FilGoal)', desc: 'أخبار الكورة المصرية والعالمية.', link: 'https://www.filgoal.com' },
        { cat: 'sports', name: '365Scores', desc: 'تنبيهات مباشرة للأهداف والنتائج.', link: 'https://www.365scores.com/ar' },

        // ألعاب
        { cat: 'games', name: 'Akinator', desc: 'المارد السحري الشهير.', link: 'https://ar.akinator.com' },
        { cat: 'games', name: 'Quick Draw', desc: 'تحدى الذكاء الاصطناعي في الرسم.', link: 'https://quickdraw.withgoogle.com' },

        // مكتبة
        { cat: 'books', name: 'مكتبة نور', desc: 'أكبر مكتبة لتحميل كتب PDF.', link: 'https://www.noor-book.com' },
        { cat: 'books', name: 'كتب هنداوي', desc: 'روايات وكتب مجانية تماماً.', link: 'https://www.hindawi.org/books/' },

        // برامج
        { cat: 'soft', name: 'CapCut', desc: 'أفضل برنامج مونتاج للموبايل والكمبيوتر.', link: 'https://www.capcut.com' },
        { id: "p1", cat: 'soft', name: 'Photopea', desc: 'بديل الفوتوشوب المجاني.', link: 'https://www.photopea.com/' }
    ];

    let currentCat = 'ai';

    function filterCat(cat, el) {
        currentCat = cat;
        // تحديث شكل الأزرار
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
        render();
    }

    function render(filter = "") {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        const filtered = data.filter(item => 
            item.cat === currentCat && 
            (item.name.toLowerCase().includes(filter) || item.desc.includes(filter))
        );

        filtered.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <span class="badge">قسم ${currentCat}</span>
                    <h3>${item.name}</h3>
                    <p>${item.desc}</p>
                    <a href="${item.link}" target="_blank" class="btn">دخول الآن</a>
                </div>
            `;
        });
    }

    document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value.toLowerCase()));
    
    // تشغيل مبدئي
    render();
</script>
</body>
</html>
